syntax = "proto3";

package api;
option go_package = "github.com/karamaru-alpha/melt/pkg/domain/proto";

import "validate/validate.proto";

service User {
  rpc Create(UserCreateRequest) returns (UserCreateResponse) {}
}

message UserCreateRequest {
  string name = 1 [(validate.rules).string = {min_len: 1, max_len: 20}];
}

message UserCreateResponse {
  string token = 1;
}
